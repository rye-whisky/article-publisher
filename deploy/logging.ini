[log_config]
version = 1
disable_existing_loggers = false

[formatters]
format_simple = %(asctime)s [%(levelname)s] %(name)s: %(message)s

[handlers]
console =
class = StreamHandler
level = INFO
formatter = format_simple
args = (sys.stdout,)

[logger_root]
level = INFO
handlers = console

[logger.uvicorn]
level = WARNING
handlers =
propagate = 1
qualname = uvicorn

[logger.uvicorn.access]
level = WARNING
handlers =
propagate = 1
qualname = uvicorn.access
